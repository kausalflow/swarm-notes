# Example research-cruise configuration
llm_model: "gemini-flash-lite-latest"
paper_source: "openalex"  # "arxiv", "semantic_scholar", or "openalex"
openalex_relevance_mode: "phrase"  # "phrase" (strict) or "all_tokens" (broader)
# paper_source: "semantic_scholar"  # requires SEMANTIC_SCHOLAR_API_KEY in .env
# paper_source: "arxiv"
paper_keywords:
  - "time series"
  - "forecasting"
  - "timeseries"
paper_max_results_per_keyword: 10
paper_total_cap: 50
federation_feeds: []
public_feed_max_items: 10

# Skill configuration
active_skills: 
  - "time-series"
skills_dir: "skills"                       # Root directory for skills

# Experimental domain expert agent (crawls HTML, consumes token quotas)
enable_domain_expert: true